<style>

    flex-direction: column;

  #rightPane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #ffffff;
  }

  #divider {
    width: 5px;

    background: #444;

  #divider:hover {
    background: #666;
  }

  .left-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .top-buttons {
    padding: 8px;
    border-bottom: 1px solid var(--left-border);
    background: var(--left-panel-bg);

  .top-buttons-row {

    margin-bottom: 6px;

    align-items: center;

  button:disabled {

    color: #888;
    cursor: default;
  }

  .editor-wrapper {
    flex: 1;
    border-top: 1px solid var(--left-border);
    border-bottom: 1px solid var(--left-border);
    background: var(--left-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;

  .CodeMirror {
    height: 100%;

  .CodeMirror-scroll {
    overflow-y: auto;
    overflow-x: hidden;

  /* 選択範囲の背景色（明るい青） */

    background-color: #3399ff !important;
  }

  /* フォーカス中の選択範囲（少しだけ濃く） */

<div id="container">
  <!-- 左側 -->
  <div id="leftPane">

<script>
    let isWrapEnabled = true; // 初期値はtrue
    const btnToggleWrap = document.getElementById('btnToggleWrap');

    function updateToggleWrapUI() {
      btnToggleWrap.title = isWrapEnabled ? "折り返しを無効にする" : "折り返しを有効にする";
      // ON/OFFで色を変えたい場合はクラス操作（任意）
      // btnToggleWrap.classList.toggle('wrap-on', isWrapEnabled);
    }

    // --- CodeMirror初期化 ---
    var editor = CodeMirror.fromTextArea(document.getElementById('code'), {
      mode: 'htmlmixed',
      theme: 'dracula',
      lineNumbers: true,
      lineWrapping: isWrapEnabled,
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      smartIndent: true,
      autoCloseBrackets: true,
      autoCloseTags: true,
      matchBrackets: true,
      foldGutter: true,
      gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
      extraKeys: {
        "Ctrl-F": "find",
        "Ctrl-H": "replace",
        "Shift-Ctrl-F": "findPersistent",
        "Shift-Ctrl-R": "replaceAll",
        "Shift-Ctrl-Down": function(cm) {
          toggleWrap();
        }
      }
    });

    function toggleWrap() {
      isWrapEnabled = !isWrapEnabled;
      editor.setOption('lineWrapping', isWrapEnabled);
      editor.refresh();
      updateToggleWrapUI();
    }
    
    btnToggleWrap.addEventListener('click', toggleWrap);
    updateToggleWrapUI();
    // Shift-Ctrl-Downをエディタ外でも有効に←一旦無効に…エディタ内操作と競合する
    //window.addEventListener('keydown', function(e) {
    //  if (e.ctrlKey && e.shiftKey && e.key === 'ArrowDown') {
    //    e.preventDefault();
    //    toggleWrap();
    //  }
	//});

  // 改行マーク表示
  editor.on("renderLine", function(cm, line, elt) {
    var span = document.createElement("span");
    span.className = "cm-eol-marker";
    span.textContent = "↵";
    elt.appendChild(span);
  });
  editor.refresh();

  const previewFrame = document.getElementById('previewFrame');
  const previewHeader = document.getElementById('previewHeader');
  const statusArea = document.getElementById('statusArea');

  const btnOpen = document.getElementById('btnOpen');
  const btnSaveOverwrite = document.getElementById('btnSaveOverwrite');
  const btnSaveTxt = document.getElementById('btnSaveTxt');
  const btnSaveHtml = document.getElementById('btnSaveHtml');
  const btnClear = document.getElementById('btnClear');
  const btnPaste = document.getElementById('btnPaste');
  const btnCopy = document.getElementById('btnCopy');
  const btnLeft20 = document.getElementById('btnLeft20');
  const btnLeft50 = document.getElementById('btnLeft50');

  const leftPane = document.getElementById('leftPane');
  const divider = document.getElementById('divider');
  const container = document.getElementById('container');

  const confirmModal = document.getElementById('confirmModal');
  const confirmMessage = document.getElementById('confirmMessage');
  const confirmYes = document.getElementById('confirmYes');
  const confirmNo = document.getElementById('confirmNo');

  const copyStatus = document.getElementById('copyStatus');
  const saveStatus = document.getElementById('saveStatus');

  let currentFileHandle = null;
  let currentFileName = null;
  let isDraggingDivider = false;

  function showSaveStatus(msg) {
    saveStatus.textContent = msg || "保存しました";
    setTimeout(() => {
      saveStatus.textContent = "";
    }, 2000);
  }
    
  function getLeftWidthPercent() {
    const totalWidth = container.clientWidth;
    const widthPx = leftPane.offsetWidth;
    if (totalWidth === 0) return 50;
    return Math.round(widthPx / totalWidth * 100);
  }
    
  function setLeftWidthPercent(percent) {
    const totalWidth = container.clientWidth;
    if (totalWidth === 0) return;
    // エディタ幅を計算
    const px = Math.max(200, totalWidth * percent / 100);
    leftPane.style.width = px + "px";
    // プレビュー領域取得
    const rightPane = document.getElementById("rightPane");
    const divider = document.getElementById("divider");
    if (percent >= 100) {
      // エディタ100%表示。プレビューとdividerを隠す
      rightPane.style.display = "none";
      divider.style.display = "none";
      // left側を100%占有
      leftPane.style.width = "100%";
      leftPane.style.maxWidth = "100%";
      leftPane.style.minWidth = "0";
    } else {
      // 通常時。プレビュー等を出す
      rightPane.style.display = "";
      divider.style.display = "";
      leftPane.style.maxWidth = "80%";
      leftPane.style.minWidth = "200px";
    }
    editor.refresh();
  }
    
  function getTitleFromHtml(html) {
    const match = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
    if (match && match[1]) {
      return match[1].trim() || "Untitled";
    }
    return "Untitled";
  }

  function updatePreviewHeader() {
    const html = editor.getValue();
    const title = getTitleFromHtml(html);
    const name = currentFileName || title;
    previewHeader.textContent = "プレビュー：[" + name + "]";
  }

  function updatePreview() {
    const html = editor.getValue();
    const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
    updatePreviewHeader();
  }

  editor.setValue(initialHtml);
  updatePreview();

  editor.on("change", function() {
    updatePreview();
  });

  const supportsFileSystemAccess = 'showOpenFilePicker' in window && 'showSaveFilePicker' in window;

  async function openFile() {
    if (!supportsFileSystemAccess) {
      alert("このブラウザは File System Access API に対応していません。");
      return;
    }
    try {
      const [handle] = await window.showOpenFilePicker({
        id: 'html-editor-folder', //ブラウザにフォルダ位置を記憶させるための識別子
        types: [
          {
            description: "HTML / Text",
            accept: {
              "text/html": [".html", ".htm"],
              "text/plain": [".txt"]
            }
          }
        ],
        excludeAcceptAllOption: false,
        multiple: false
      });
      const file = await handle.getFile();
      const text = await file.text();
      editor.setValue(text);
      currentFileHandle = handle;
      currentFileName = file.name;
      btnSaveOverwrite.disabled = false;
      updatePreview();
    } catch (e) {
      if (e.name !== "AbortError") {
        console.error(e);
        alert("ファイルの読込みに失敗しました。");
      }
    }
  }

  async function saveToHandle(handle) {
    const writable = await handle.createWritable();
    await writable.write(editor.getValue());
    await writable.close();
  }

  async function saveOverwrite() {
    if (!currentFileHandle) return;
    try {
      await saveToHandle(currentFileHandle);
      showSaveStatus("上書き保存しました");
    } catch (e) {
      console.error(e);
      alert("上書き保存に失敗しました。");
    }
  }

  async function saveAs(ext) {
    if (!supportsFileSystemAccess) {
      alert("このブラウザは File System Access API に対応していません。");
      return;
    }
    const html = editor.getValue();
    const title = getTitleFromHtml(html);
    const defaultName = title + ext;

    let mime = "text/plain";
    if (ext === ".html" || ext === ".htm") {
      mime = "text/html";
    }

    try {
      const handle = await window.showSaveFilePicker({
        id: 'html-editor-folder', //読み込み時と同じ識別子を指定することで、フォルダ位置を同期させます
        suggestedName: defaultName,
        types: [
          {
            description: ext === ".txt" ? "Text File" : "HTML File",
            accept: {
              [mime]: [ext]
            }
          }
        ]
      });
      await saveToHandle(handle);
      currentFileHandle = handle;
      currentFileName = (await handle.getFile()).name;
      btnSaveOverwrite.disabled = false;
      showSaveStatus("保存しました");
      updatePreviewHeader();
    } catch (e) {
      if (e.name !== "AbortError") {
        console.error(e);
        alert("保存に失敗しました。");
      }
    }
  }

  function showConfirm(message) {
    return new Promise((resolve) => {
      confirmMessage.textContent = message;
      confirmModal.style.display = "flex";

      function cleanup(result) {
        confirmModal.style.display = "none";
        confirmYes.removeEventListener("click", onYes);
        confirmNo.removeEventListener("click", onNo);
        resolve(result);
      }

      function onYes() { cleanup(true); }
      function onNo() { cleanup(false); }

      confirmYes.addEventListener("click", onYes);
      confirmNo.addEventListener("click", onNo);
    });
  }

  // --- クリア ---
  btnClear.addEventListener('click', async () => {
    if (!editor.getValue()) {
      editor.setValue("");
      updatePreview();
      return;
    }
    const ok = await showConfirm("テキストボックスをクリアします");
    if (ok) {
      editor.setValue("");
      currentFileHandle = null;
      currentFileName = null;
      btnSaveOverwrite.disabled = true;
      updatePreview();
    }
  });

  // --- ペースト（クリップボード → エディタ） ---
  btnPaste.addEventListener('click', async () => {
    if (!navigator.clipboard || !navigator.clipboard.readText) {
      alert("このブラウザはクリップボードからのペーストに対応していません。");
      return;
    }

    const currentText = editor.getValue();
    if (currentText) {
      const ok = await showConfirm("テキストボックスをクリアしてクリップボードからペーストします");
      if (!ok) {
        return;
      }
    }

    try {
      const text = await navigator.clipboard.readText();
      editor.setValue(text);
      // ファイルハンドルはリセット（新規テキスト扱い）
      currentFileHandle = null;
      currentFileName = null;
      btnSaveOverwrite.disabled = true;
      updatePreview();
    } catch (e) {
      console.error(e);
      alert("クリップボードからのペーストに失敗しました。");
    }
  });

  // --- コピー（エディタ → クリップボード） ---
  btnCopy.addEventListener('click', async () => {
    if (!navigator.clipboard || !navigator.clipboard.writeText) {
      alert("このブラウザはクリップボードへのコピーに対応していません。");
      return;
    }
    try {
      await navigator.clipboard.writeText(editor.getValue());
      copyStatus.textContent = "コピーしました";
      setTimeout(() => {
        copyStatus.textContent = "";
      }, 2000);
    } catch (e) {
      console.error(e);
      alert("クリップボードへのコピーに失敗しました。");
    }
  });

  // --- レイアウト関連 ---
  btnOpen.addEventListener('click', openFile);
  btnSaveOverwrite.addEventListener('click', saveOverwrite);
  btnSaveTxt.addEventListener('click', () => saveAs(".txt"));
  btnSaveHtml.addEventListener('click', () => saveAs(".html"));

  btnLeft20.addEventListener('click', () => {  // |←
    const percent = getLeftWidthPercent();
    if (percent <= 50) {
      setLeftWidthPercent(20);
    } else {
      setLeftWidthPercent(50);
    }
  });

  btnLeft50.addEventListener('click', () => {  // →|
    const percent = getLeftWidthPercent();
    if (percent <= 49) {
      setLeftWidthPercent(50);
    } else {
      setLeftWidthPercent(100);
    }
  });

  divider.addEventListener('mousedown', (e) => {
    isDraggingDivider = true;
    document.body.style.cursor = 'col-resize';
    // ドラッグ開始時にiframeのマウスイベントを無効化
    previewFrame.style.pointerEvents = 'none'; 
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDraggingDivider) return;
    const rect = container.getBoundingClientRect();
    let newWidth = e.clientX - rect.left;
    const minWidth = 200;
    const maxWidth = rect.width * 0.8;
    if (newWidth < minWidth) newWidth = minWidth;
    if (newWidth > maxWidth) newWidth = maxWidth;
    leftPane.style.width = newWidth + "px";
    editor.refresh();
  });

  window.addEventListener('mouseup', () => {
    if (isDraggingDivider) {
      isDraggingDivider = false;
      document.body.style.cursor = 'default';
      // ドラッグ終了時にiframeのマウスイベントを元に戻す
      previewFrame.style.pointerEvents = 'auto'; 
    }
  });

  
  window.addEventListener('keydown', (e) => {
    // Ctrl+S で上書き保存
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault();
      if (!btnSaveOverwrite.disabled) {
        saveOverwrite();
      }
    }
    // 隠し: Ctrl+Shift+← で「|←」（btnLeft20）、Ctrl+Shift+→で「→|」（btnLeft50）
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && !e.altKey) {
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        btnLeft20.click();
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        btnLeft50.click();
      }
    }
  });
    
  updatePreviewHeader();
  
  // --- 動的ファビコン（CanvasでPNG生成） ---
	  (function setDynamicFavicon() {
	    const size = 32; // 推奨32px（必要なら64などもOK）
	    const bg = '#1976d2'; // 青背景（あなたのCSS変数 --primary に近い色）
	    const label = 'H';     // 表示文字（必要なら変更可）
	    const font = 'bold 22px Segoe UI, Arial, "Noto Sans JP", sans-serif';
	    // Canvas生成
	    const c = document.createElement('canvas');
	    c.width = size; c.height = size;
	    const ctx = c.getContext('2d');
	    // 角丸
	    const radius = 6; // 角丸半径
	    ctx.beginPath();
	    ctx.moveTo(radius, 0);
	    ctx.arcTo(size, 0, size, size, radius);
	    ctx.arcTo(size, size, 0, size, radius);
	    ctx.arcTo(0, size, 0, 0, radius);
	    ctx.arcTo(0, 0, size, 0, radius);
	    ctx.closePath();
	    ctx.clip();
	    // 背景
	    ctx.fillStyle = bg;
	    ctx.fillRect(0, 0, size, size);
	    // 文字（中央揃え）
	    ctx.fillStyle = '#fff';
	    ctx.font = font;
	    ctx.textAlign = 'center';
	    ctx.textBaseline = 'middle';
	    ctx.fillText(label, size / 2, size / 2);
	    // データURL化して適用
	    const url = c.toDataURL('image/png');
	    let el = document.getElementById('favicon');
	    if (!el) {
	      el = document.createElement('link');
	      el.id = 'favicon';
	      el.rel = 'icon';
	      el.type = 'image/png';
	      document.head.appendChild(el);
	    }
	    el.setAttribute('href', url);
	  })();
