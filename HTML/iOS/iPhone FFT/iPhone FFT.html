<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>iPhone/iPad 1画面 FFT解析（情報欄省略・ボタン保護）</title>
<style>
  :root{
    --bg:#0e1116; --panel:#141922; --text:#e6edf3; --muted:#93a1b3; --accent:#4ea1ff; --line:#1e2634;
    --fs:14px; --r:12px;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,Segoe UI,Roboto,"Hiragino Sans",sans-serif;overflow-x:hidden}

  /* 100vh→100svhで上書き（iOS/iPadOSのバー対策）＋Safe Area下余白 */
  #app{
    height:100vh; display:grid; grid-template-rows:auto 1fr auto; gap:8px; padding:8px; box-sizing:border-box; overflow:hidden;
    padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  }
  @supports (height: 100svh){ #app{height:100svh;} }

  /* 上部バー */
  .bar{display:flex;align-items:center;gap:8px}
  .title{font-weight:600;font-size:16px;flex:1;text-align:center}
  .iconbtn{width:36px;height:36px;display:inline-grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:#0f131b;color:#cfe0ff}
  .primary{background:var(--accent);color:#07223d;border:none}
  .ghost{background:#0f131b;border:1px solid var(--line);color:#cfe0ff}
  button,select,input{font-size:var(--fs);padding:8px;border-radius:8px}

  /* ビュー領域 */
  #view{position:relative;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);overflow:hidden}
  .tabs{position:absolute;top:6px;left:6px;z-index:3}
  .tabs input{display:none}
  .tabs label{padding:5px 8px;font-size:12px;background:#0f131b;color:#c9d4e6;border:1px solid var(--line);border-radius:6px;margin-right:4px}
  .tabs input:checked+label{background:#2a3446;color:#dbe6f7}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  #plot,#gram{background:#0a0d12}

  /* HUD（サブカーソル情報） */
  #hud{
    position:absolute;left:8px;bottom:8px;z-index:4;display:none;
    background:rgba(20,24,32,0.85);border:1px solid #2b3546;border-radius:8px;
    color:#dbe6f7;font:12px ui-monospace,monospace;padding:4px 8px;pointer-events:none;
  }

  /* 下部情報バー：2カラムグリッド（左=1fr/右=内容幅）で右ボタンを常に表示 */
  #info{
    display:grid; grid-template-columns: minmax(0,1fr) auto; align-items:center; gap:8px;
    min-height:40px; padding-bottom:env(safe-area-inset-bottom,0px);
  }
  #info .kv{
    font-size:12px; color:#9fb0c7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-variant-numeric: tabular-nums;
  }
  #info .btns{
    display:flex; gap:6px; align-items:center; justify-content:flex-end;
    flex:0 0 auto; overflow:hidden;
  }
  #info .btns > button{
    height:34px; line-height:34px; padding:0 10px;
    font-size:13px; white-space:nowrap;
    display:inline-flex; align-items:center; gap:6px;
  }
  #info .btns svg{ width:16px; height:16px; display:block }

  /* 横幅が狭いときはボタンのラベル非表示（アイコンのみ）で幅節約 */
  @media (max-width: 380px){
    #info .btns > button{ padding:0 8px; }
    #info .btns .lbl{ display:none; }
  }
  @media (min-width:768px){
    #info{ min-height:44px; }
    #info .btns > button{ height:36px; line-height:36px; font-size:14px; }
  }

  /* 左ドロワー（ハンバーガー） */
  #drawer{position:fixed;inset:0 0 0 0;display:none;z-index:10}
  #drawer.open{display:block}
  .shade{position:absolute;inset:0;background:rgba(0,0,0,0.45)}
  .sheet{position:absolute;left:0;top:0;bottom:0;width:min(86vw,360px);background:#0f131b;border-right:1px solid var(--line);padding:12px;box-sizing:border-box;overflow:auto}
  .h3{font-size:14px;color:#cdd7e5;margin:10px 0 6px}
  .optrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .radio{display:flex;gap:8px}
  .radio input{margin-right:4px}
  .tag{font-size:12px;color:var(--muted)}
  input[type="number"]{width:90px;background:#0f131b;color:#e6edf3;border:1px solid var(--line)}
  select{background:#0f131b;color:#e6edf3;border:1px solid var(--line)}

  /* モーダル */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:11}
  .modal-body{width:min(560px,92vw);max-height:86vh;background:#0f131b;border:1px solid var(--line);border-radius:12px;padding:10px;overflow:auto}
  .modal-body h3{margin:6px 0 8px 0;font-size:15px}
  video,audio{width:100%;background:#000;border-radius:8px}
</style>
</head>
<body>
<div id="app">
  <!-- 上段バー -->
  <div class="bar">
    <button id="btnMenu" class="iconbtn" aria-label="メニュー" title="メニュー">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="#cfe0ff" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="title">リアルタイムFFT</div>
    <button id="btnInit" class="iconbtn primary" title="オーディオ開始/再開">▶</button>
    <button id="btnStop" class="iconbtn ghost" title="停止">■</button>
  </div>

  <!-- 表示（既定：スペクトル） -->
  <div id="view">
    <div class="tabs">
      <input type="radio" id="tabWave" name="tab"><label for="tabWave">波形</label>
      <input type="radio" id="tabSpec" name="tab" checked><label for="tabSpec">スペクトル</label>
      <input type="radio" id="tabGram" name="tab"><label for="tabGram">スペクトログラム</label>
    </div>
    <canvas id="plot"></canvas>
    <canvas id="gram" style="display:none"></canvas>
    <div id="hud"></div>
  </div>

  <!-- 下段情報（2カラム：左=省略/右=ボタン） -->
  <div id="info">
    <div class="kv">SR <span id="iRate">-</span> | <span id="iLen">-</span> | Pk <span id="iPeak">-</span></div>
    <div class="btns">
      <button id="btnPeaks" class="ghost" title="ピーク一覧">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 15l4-6 4 5 4-8 4 10" stroke="#cfe0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="lbl">ピーク一覧</span>
      </button>
      <button id="btnCsv" class="ghost" title="CSV">
        <svg viewBox="0 0 24 24" fill="none"><path d="M8 17h8M8 13h8M8 9h4M4 3h10l6 6v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" stroke="#cfe0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="lbl">CSV</span>
      </button>
    </div>
  </div>
</div>

<!-- ドロワー：モード切替＋各操作 -->
<div id="drawer">
  <div class="shade"></div>
  <div class="sheet">
    <div class="h3">モード</div>
    <div class="radio">
      <label><input type="radio" name="mode" id="modeMic" checked> リアルタイム（マイク）</label>
      <label><input type="radio" name="mode" id="modeFile"> ファイル解析</label>
    </div>

    <div class="h3">解析設定</div>
    <div class="optrow">
      <span class="tag">窓</span>
      <select id="windowFn"><option value="hann" selected>Hann</option><option value="hamming">Hamming</option><option value="rect">Rect</option></select>
      <span class="tag">FFT</span>
      <select id="fftSize"><option>1024</option><option selected>2048</option><option>4096</option><option>8192</option></select>
      <span class="tag">平均</span>
      <select id="avgMode"><option value="mean" selected>平均</option><option value="max">最大</option></select>
    </div>

    <div id="secMic">
      <div class="h3">マイク</div>
      <div class="optrow">
        <button id="btnMicStart" class="primary">開始</button>
        <button id="btnMicSnap" class="ghost">2秒FFT</button>
        <label class="tag">ゲイン <input id="micGain" type="range" min="0" max="3" step="0.01" value="1" style="width:140px"></label>
      </div>
      <div class="tag">HTTPSが必要です。ハウリング防止のためイヤホン推奨。</div>
    </div>

    <div id="secFile" style="display:none">
      <div class="h3">ファイル（音声/動画）</div>
      <div class="optrow">
        <input id="fileInput" type="file" accept="audio/*,video/*">
        <button id="btnPreview" class="ghost">プレビュー</button>
      </div>
      <div class="optrow">
        <label class="tag">開始[s] <input id="startSec" type="number" min="0" step="0.01" value="0"></label>
        <label class="tag">終了[s] <input id="endSec" type="number" min="0" step="0.01" value="0"></label>
        <button id="btnSetStart" class="ghost">開始=現在位置</button>
        <button id="btnSetEnd" class="ghost">終了=現在位置</button>
      </div>
      <div class="optrow">
        <button id="btnAnalyzeFast" class="primary">区間FFT（高速：音声）</button>
        <button id="btnAnalyzeRT" class="ghost">区間FFT（互換：動画可）</button>
      </div>
      <div id="meta" class="tag">ファイル未選択</div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modal">
  <div class="modal-body">
    <button id="modalClose" class="ghost" style="float:right">閉じる</button>
    <h3 id="modalTitle">プレビュー</h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(()=>{'use strict';
  const $=id=>document.getElementById(id);
  const dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  const plot=$('plot'), gram=$('gram'), view=$('view'), hud=$('hud');
  let lastWave=null, lastWaveSR=0, lastSpec=null, lastFreqs=null, lastPeak=null;

  // サブカーソル
  let cursorActive=false, cursorX=0;

  // レイアウト
  function resizeCanvas(){
    const r=view.getBoundingClientRect();
    [plot,gram].forEach(cv=>{
      const w=Math.floor(r.width*dpr), h=Math.floor(r.height*dpr);
      if(cv.width!==w||cv.height!==h){ cv.width=w; cv.height=h; }
      cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
    });
    redraw();
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', ()=>setTimeout(resizeCanvas,250));

  // タブ
  function syncTabs(){
    const g=$('tabGram').checked;
    plot.style.display=g?'none':'block';
    gram.style.display=g?'block':'none';
    if(!$('tabSpec').checked){ cursorActive=false; hud.style.display='none'; }
    redraw();
  }
  ['tabWave','tabSpec','tabGram'].forEach(id=>$(id).addEventListener('change', syncTabs));

  // 描画
  function drawGrid(ctx,w,h){
    ctx.strokeStyle='#1b2230'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<=10;i++){ const x=Math.round(i/10*w)+0.5; ctx.moveTo(x,0); ctx.lineTo(x,h); }
    for(let i=0;i<=4;i++){ const y=Math.round(i/4*h)+0.5; ctx.moveTo(0,y); ctx.lineTo(w,y); }
    ctx.stroke();
  }
  function drawWave(samples,sr){
    const ctx=plot.getContext('2d'), w=plot.width, h=plot.height;
    ctx.clearRect(0,0,w,h); drawGrid(ctx,w,h);
    if(!samples) return;
    ctx.strokeStyle='#75c9a8'; ctx.lineWidth=1.6*dpr; ctx.beginPath();
    const step=Math.max(1,Math.floor(samples.length/w)), y0=h/2;
    for(let x=0,i=0;x<w;x++,i+=step){
      const s=samples[Math.min(i,samples.length-1)];
      const y=y0 - s*(h*0.45);
      if(x===0) ctx.moveTo(x+0.5,y); else ctx.lineTo(x+0.5,y);
    }
    ctx.stroke();
  }
  function drawSpec(freqs,magDb,peak){
    const ctx=plot.getContext('2d'), w=plot.width, h=plot.height;
    ctx.clearRect(0,0,w,h); drawGrid(ctx,w,h);
    if(!freqs||!magDb) return;
    const minDb=-100,maxDb=0;
    ctx.strokeStyle='#4ea1ff'; ctx.lineWidth=1.8*dpr; ctx.beginPath();
    for(let i=0;i<magDb.length;i++){
      const x=i/(magDb.length-1)*w+0.5;
      const y=(1-(magDb[i]-minDb)/(maxDb-minDb))*h;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    if(peak&&isFinite(peak.freq)){
      const x=peak.freq/freqs[freqs.length-1]*w+0.5;
      const y=(1-(peak.db-minDb)/(maxDb-minDb))*h;
      ctx.fillStyle='#ffcf5a'; ctx.beginPath(); ctx.arc(x,y,3.6*dpr,0,Math.PI*2); ctx.fill();
    }
    // サブカーソル
    if(cursorActive){
      const x=clamp(cursorX,0,w-1);
      ctx.strokeStyle='#ffd36b'; ctx.lineWidth=1*dpr; ctx.setLineDash([4*dpr,3*dpr]);
      ctx.beginPath(); ctx.moveTo(x+0.5,0); ctx.lineTo(x+0.5,h); ctx.stroke(); ctx.setLineDash([]);

      const idx=Math.round((x/w)*(magDb.length-1));
      const f=freqs[idx], m=magDb[idx];
      const label=`${f<1000? f.toFixed(0)+' Hz' : (f/1000).toFixed(2)+' kHz'} / ${isFinite(m)?m.toFixed(1):'-'} dB`;

      hud.style.display='block';
      hud.textContent=label;
    }
  }
  function clearGram(){
    const ctx=gram.getContext('2d'); ctx.clearRect(0,0,gram.width,gram.height); drawGrid(ctx,gram.width,gram.height);
  }
  function gramPainter(){
    const ctx=gram.getContext('2d');
    return { putImageData:(img,x,y)=>ctx.putImageData(img,x,y), width:gram.width, height:gram.height };
  }
  function redraw(){
    if($('tabWave').checked && lastWave) drawWave(lastWave,lastWaveSR);
    if($('tabSpec').checked && lastSpec&&lastFreqs) drawSpec(lastFreqs,lastSpec,lastPeak);
  }

  // ポインタ（サブカーソル）
  function onPointer(e){
    if(!$('tabSpec').checked || !lastFreqs || !lastSpec) return;
    const rect=plot.getBoundingClientRect();
    cursorX=(e.clientX-rect.left)*dpr;
    cursorActive=true;
    redraw();
    e.preventDefault();
  }
  function onPointerEnd(){
    if(cursorActive){ cursorActive=false; hud.style.display='none'; redraw(); }
  }
  plot.addEventListener('pointerdown', onPointer, {passive:false});
  plot.addEventListener('pointermove', onPointer, {passive:false});
  plot.addEventListener('pointerup', onPointerEnd);
  plot.addEventListener('pointercancel', onPointerEnd);
  plot.addEventListener('pointerleave', onPointerEnd);

  // 窓関数・FFT
  function makeWindow(name,N){
    const w=new Float32Array(N);
    if(name==='hann'){ for(let n=0;n<N;n++) w[n]=0.5*(1-Math.cos(2*Math.PI*n/(N-1))); }
    else if(name==='hamming'){ for(let n=0;n<N;n++) w[n]=0.54-0.46*Math.cos(2*Math.PI*n/(N-1)); }
    else { w.fill(1); }
    return w;
  }
  function fftRadix2(re,im){
    const n=re.length, levels=Math.log2(n)|0; if((1<<levels)!==n) throw 'FFTサイズは2の冪が必要';
    for(let i=0,j=0;i<n;i++){
      if(j>i){ let tr=re[i];re[i]=re[j];re[j]=tr; tr=im[i];im[i]=im[j];im[j]=tr; }
      let m=n>>1; while(m && (j&m)){ j^=m; m>>=1; } j|=m;
    }
    for(let size=2; size<=n; size<<=1){
      const half=size>>1, theta=-2*Math.PI/size;
      const wpr=Math.cos(theta), wpi=Math.sin(theta);
      for(let i=0;i<n;i+=size){
        let wr=1, wi=0;
        for(let j=0;j<half;j++){
          const k=i+j, l=k+half;
          const tr=wr*re[l]-wi*im[l], ti=wr*im[l]+wi*re[l];
          re[l]=re[k]-tr; im[l]=im[k]-ti; re[k]+=tr; im[k]+=ti;
          const t=wr; wr=t*wpr - wi*wpi; wi=t*wpi + wi*wpr;
        }
      }
    }
  }
  function computeSpectrum(signal,sr,fftSize,winName='hann',avg='mean',gctx=null){
    const hop=fftSize>>1, w=makeWindow(winName,fftSize), W=w.reduce((a,b)=>a+b*b,0);
    const frames=Math.max(0,Math.floor((signal.length-fftSize)/hop)+1);
    const nb=fftSize/2, acc=new Float64Array(nb); let gx=0, gstep=gctx?Math.max(1,Math.floor(frames/gctx.width)):0;
    for(let f=0; f<frames; f++){
      const off=f*hop; const re=new Float32Array(fftSize), im=new Float32Array(fftSize);
      for(let n=0;n<fftSize;n++) re[n]=(signal[off+n]||0)*w[n];
      fftRadix2(re,im);
      for(let k=0;k<nb;k++){
        let p=(re[k]*re[k]+im[k]*im[k])/W; if(k>0 && k<nb-1) p*=2;
        if(avg==='max'){ if(p>acc[k]) acc[k]=p; } else acc[k]+=p;
      }
      if(gctx && (f%gstep===0)){
        const col=new Uint8ClampedArray(nb*4);
        for(let k=0;k<nb;k++){
          const p=(avg==='max')?acc[k]:(acc[k]/(f+1));
          const db=10*Math.log10(p+1e-12), norm=clamp((db+100)/100,0,1);
          const r=Math.round(255*Math.pow(norm,3));
          const g=Math.round(255*Math.pow(norm,0.5)*0.6);
          const b=Math.round(255*(1-norm));
          const idx=(nb-1-k)*4; col[idx]=r; col[idx+1]=g; col[idx+2]=b; col[idx+3]=255;
        }
        gctx.putImageData(new ImageData(col,1,nb), gx++, 0);
      }
    }
    const framesEff=Math.max(1,frames), magDb=new Float32Array(nb); let peakDb=-1e9, peakBin=0;
    for(let k=0;k<nb;k++){ const p=(avg==='max')?acc[k]:(acc[k]/framesEff); const db=10*Math.log10(p+1e-12); magDb[k]=db; if(db>peakDb){ peakDb=db; peakBin=k; } }
    const freqs=new Float32Array(nb); for(let k=0;k<nb;k++) freqs[k]=k*sr/fftSize;
    return {freqs,magDb,peak:{freq:freqs[peakBin],db:peakDb}};
  }
  function listPeaks(freqs,magDb,topN=8,minSep=30){
    const idx=[]; for(let i=1;i<magDb.length-1;i++) if(magDb[i]>magDb[i-1] && magDb[i]>magDb[i+1]) idx.push(i);
    idx.sort((a,b)=>magDb[b]-magDb[a]);
    const sel=[]; for(const i of idx){ if(sel.every(j=>Math.abs(freqs[j]-freqs[i])>=minSep)) sel.push(i); if(sel.length>=topN) break; }
    return sel.map(i=>({f:freqs[i],db:magDb[i]})).sort((a,b)=>b.db-a.db);
  }

  // 短縮表記
  function rateShort(sr){ return sr>=1000 ? ((sr/1000) % 1 === 0 ? (sr/1000).toFixed(0) : (sr/1000).toFixed(1))+'k' : String(sr); }
  function hzShort(f){ return f<1000 ? f.toFixed(0)+'Hz' : (f/1000).toFixed(2)+'kHz'; }

  // WebAudio
  let audioCtx=null, mainGain=null;
  let micStream=null, micSource=null, micAnalyser=null, micGainNode=null, micRAF=0, micProc=null, micRing=null, micTotal=0;
  let micActive=false;

  async function ensureAudio(){
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
      mainGain=audioCtx.createGain(); mainGain.gain.value=0.0; mainGain.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended') await audioCtx.resume();
  }

  // リアルタイム（デフォルト）
  async function startMic(){
    if(micActive) return;
    await ensureAudio();
    try{
      micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }catch(e){ alert('マイク取得失敗（HTTPSが必要）: '+e.message); return; }
    micSource=audioCtx.createMediaStreamSource(micStream);
    micGainNode=audioCtx.createGain(); micGainNode.gain.value=parseFloat($('micGain').value)||1;
    micAnalyser=audioCtx.createAnalyser(); micAnalyser.fftSize=2048; micAnalyser.smoothingTimeConstant=0.6;
    micSource.connect(micGainNode).connect(micAnalyser).connect(mainGain); // 無音出力
    micProc=(audioCtx.createScriptProcessor||audioCtx.createJavaScriptNode).call(audioCtx,4096,1,1);
    micRing=[]; micTotal=0;
    micProc.onaudioprocess=ev=>{
      const ch0=ev.inputBuffer.getChannelData(0); micRing.push(new Float32Array(ch0)); micTotal+=ch0.length;
      const lim=Math.floor(audioCtx.sampleRate*2.1); while(micTotal>lim){ const f=micRing.shift(); micTotal-=f.length; }
    };
    micGainNode.connect(micProc).connect(mainGain);
    micActive=true;
    liveLoop();
  }
  function stopMic(){
    cancelAnimationFrame(micRAF); micRAF=0;
    try{ micProc&&micProc.disconnect(); }catch{} micProc=null;
    try{ micAnalyser&&micAnalyser.disconnect(); }catch{} micAnalyser=null;
    try{ micGainNode&&micGainNode.disconnect(); }catch{} micGainNode=null;
    try{ micSource&&micSource.disconnect(); }catch{} micSource=null;
    if(micStream){ for(const t of micStream.getTracks()) t.stop(); micStream=null; }
    micActive=false;
  }
  function liveLoop(){
    cancelAnimationFrame(micRAF); if(!micAnalyser) return;
    const n=micAnalyser.frequencyBinCount;
    const fr=new Float32Array(n), td=new Float32Array(micAnalyser.fftSize);
    const draw=()=>{
      if(!micAnalyser) return;
      micAnalyser.getFloatTimeDomainData(td);
      micAnalyser.getFloatFrequencyData(fr);
      lastWave=td; lastWaveSR=audioCtx.sampleRate;
      const maxF=audioCtx.sampleRate/2, binsFreq=new Float32Array(n); for(let i=0;i<n;i++) binsFreq[i]=i*maxF/n;
      let pk=-1e9, pbin=0; for(let i=0;i<n;i++){ if(fr[i]>pk){ pk=fr[i]; pbin=i; } }
      lastFreqs=binsFreq; lastSpec=fr; lastPeak={freq:binsFreq[pbin], db:pk};
      if($('tabSpec').checked) drawSpec(lastFreqs,lastSpec,lastPeak);
      else if($('tabWave').checked) drawWave(lastWave,lastWaveSR);
      $('iRate').textContent = rateShort(audioCtx.sampleRate);
      $('iLen').textContent  = `${(td.length/audioCtx.sampleRate).toFixed(2)}s`;
      $('iPeak').textContent = `${hzShort(lastPeak.freq)} ${lastPeak.db.toFixed(1)}dB`;
      micRAF=requestAnimationFrame(draw);
    };
    draw();
  }

  // ファイル解析
  let objectUrl=null, currentFile=null, isVideo=false;
  const videoEl=document.createElement('video'); videoEl.playsInline=true; videoEl.controls=true; videoEl.muted=true; videoEl.style.width='100%';
  const audioEl=document.createElement('audio'); audioEl.controls=true; audioEl.style.width='100%';

  $('fileInput').addEventListener('change', ()=>{
    if(objectUrl){ URL.revokeObjectURL(objectUrl); objectUrl=null; }
    currentFile=$('fileInput').files&&$('fileInput').files[0]?$('fileInput').files[0]:null;
    if(!currentFile){ $('meta').textContent='ファイル未選択'; return; }
    isVideo=currentFile.type.startsWith('video/');
    objectUrl=URL.createObjectURL(currentFile);
    if(isVideo){
      videoEl.src=objectUrl; videoEl.onloadedmetadata=()=>{ $('startSec').value='0'; $('endSec').value=videoEl.duration.toFixed(2); $('meta').textContent=`動画 ${fmtSize(currentFile.size)} / ${fmtSec(videoEl.duration)}`; };
    }else{
      audioEl.src=objectUrl; audioEl.onloadedmetadata=()=>{ $('startSec').value='0'; $('endSec').value=audioEl.duration.toFixed(2); $('meta').textContent=`音声 ${fmtSize(currentFile.size)} / ${fmtSec(audioEl.duration)}`; };
    }
  });
  function fmtSec(t){ if(!isFinite(t)) return '-'; const m=Math.floor(t/60), s=Math.floor(t%60); return `${m}:${('0'+s).slice(-2)} (${t.toFixed(2)}s)`; }
  function fmtSize(n){ if(n<1024) return n+'B'; if(n<1048576) return (n/1024).toFixed(1)+'KB'; return (n/1048576).toFixed(1)+'MB'; }

  $('btnPreview').addEventListener('click', ()=>{
    if(!currentFile) return alert('ファイル未選択');
    openModal('プレビュー', isVideo?videoEl:audioEl);
  });
  $('btnSetStart').addEventListener('click', ()=>{
    const el=isVideo?videoEl:audioEl; if(!el || isNaN(el.currentTime)) return alert('プレビューで位置を合わせてください');
    $('startSec').value=(el.currentTime||0).toFixed(2);
  });
  $('btnSetEnd').addEventListener('click', ()=>{
    const el=isVideo?videoEl:audioEl; if(!el || isNaN(el.currentTime)) return alert('プレビューで位置を合わせてください');
    $('endSec').value=(el.currentTime||0).toFixed(2);
  });

  $('btnAnalyzeFast').addEventListener('click', async ()=>{
    if(!currentFile) return alert('ファイルを選択してください');
    if(!currentFile.type.startsWith('audio/')) return alert('高速解析は音声ファイルのみ。動画は「互換」を使用してください。');
    await ensureAudio();
    const s=Math.max(0,parseFloat($('startSec').value)||0), e=Math.max(s,parseFloat($('endSec').value)||0);
    if(e<=s) return alert('区間が不正です');
    const ab=await currentFile.arrayBuffer();
    let buf; try{ buf=await audioCtx.decodeAudioData(ab.slice(0)); }catch(err){ return alert('デコード失敗: '+err.message); }
    const sr=buf.sampleRate, beg=Math.floor(s*sr), end=Math.min(buf.length,Math.floor(e*sr));
    const ch0=buf.getChannelData(0).slice(beg,end);
    if(buf.numberOfChannels>1){ const ch1=buf.getChannelData(1).slice(beg,end); for(let i=0;i<ch0.length;i++) ch0[i]=0.5*(ch0[i]+ch1[i]); }
    lastWave=ch0; lastWaveSR=sr; clearGram();
    const {freqs,magDb,peak}=computeSpectrum(ch0,sr,parseInt($('fftSize').value,10),$('windowFn').value,$('avgMode').value, gramPainter());
    lastFreqs=freqs; lastSpec=magDb; lastPeak=peak;
    $('tabSpec').checked=true; syncTabs(); redraw(); updateInfo(sr, ch0.length/sr, peak);
    closeDrawer();
  });

  let collecting=false, collector=null;
  function stopCollector(){
    collecting=false;
    if(collector){ try{ collector.node&&collector.node.disconnect(); collector.source&&collector.source.disconnect(); collector.gain&&collector.gain.disconnect(); }catch{} collector=null; }
  }
  $('btnAnalyzeRT').addEventListener('click', async ()=>{
    if(!currentFile) return alert('ファイルを選択してください');
    await ensureAudio(); stopCollector(); clearGram();
    const s=Math.max(0,parseFloat($('startSec').value)||0), e=Math.max(s,parseFloat($('endSec').value)||0);
    if(e<=s) return alert('区間が不正です');
    const el=isVideo?videoEl:audioEl; el.currentTime=s; el.muted=true; await el.play().catch(()=>{});
    await new Promise(r=>{ let tries=0; const iv=setInterval(()=>{ if(Math.abs(el.currentTime - s)<0.03 || tries>30){ clearInterval(iv); r(); } tries++; },30); });
    const src=audioCtx.createMediaElementSource(el), gain=audioCtx.createGain(); gain.gain.value=0.0;
    const procSize=4096; const node=(audioCtx.createScriptProcessor||audioCtx.createJavaScriptNode).call(audioCtx,procSize,2,2);
    const ring=[]; let total=0; const target=e-s, sr=audioCtx.sampleRate;
    node.onaudioprocess=ev=>{
      if(!collecting) return;
      const in0=ev.inputBuffer.getChannelData(0), in1=ev.inputBuffer.numberOfChannels>1?ev.inputBuffer.getChannelData(1):null;
      const m=new Float32Array(in0.length); if(in1){ for(let i=0;i<m.length;i++) m[i]=0.5*(in0[i]+in1[i]); } else m.set(in0);
      ring.push(m); total+=m.length;
      if(total/sr >= target-1/sr){
        collecting=false; setTimeout(async ()=>{
          try{ el.pause(); }catch{}
          src.disconnect(); node.disconnect(); gain.disconnect();
          const mono=concatFloat32(ring,total); lastWave=mono; lastWaveSR=sr;
          const {freqs,magDb,peak}=computeSpectrum(mono,sr,parseInt($('fftSize').value,10),$('windowFn').value,$('avgMode').value, gramPainter());
          lastFreqs=freqs; lastSpec=magDb; lastPeak=peak;
          $('tabSpec').checked=true; syncTabs(); redraw(); updateInfo(sr, mono.length/sr, peak);
        },0);
      }
    };
    src.connect(node); node.connect(gain); gain.connect(mainGain);
    collector={source:src,node,gain}; collecting=true; closeDrawer();
  });
  function concatFloat32(chunks,totalLen){ const out=new Float32Array(totalLen); let off=0; for(const c of chunks){ out.set(c,off); off+=c.length; } return out; }

  // 情報・CSV・ピーク
  function updateInfo(sr,len,peak){
    $('iRate').textContent=rateShort(sr);
    $('iLen').textContent=isFinite(len)?`${len.toFixed(2)}s`:'-';
    $('iPeak').textContent=(peak&&isFinite(peak.freq)) ? `${hzShort(peak.freq)} ${peak.db.toFixed(1)}dB` : '-';
    window.__lastPeaks=(lastFreqs&&lastSpec)?listPeaks(lastFreqs,lastSpec):[];
  }
  $('btnCsv').addEventListener('click', ()=>{
    if(!lastFreqs||!lastSpec) return alert('先に解析を実行してください');
    let csv='freq_hz,mag_db\n'; for(let i=0;i<lastFreqs.length;i++) csv+=`${lastFreqs[i]},${lastSpec[i]}\n`;
    const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='spectrum.csv'; document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },0);
  });
  $('btnPeaks').addEventListener('click', ()=>{
    const pre=document.createElement('pre'); pre.style='white-space:pre-wrap;font:12px ui-monospace,monospace;color:#cfe0ff';
    const rows=(window.__lastPeaks||[]).map(p=>`${hzShort(p.f)}  |  ${p.db.toFixed(1)} dB`).join('\n') || '-';
    pre.textContent=rows; openModal('ピーク一覧（上位）', pre);
  });

  // ドロワー
  function openDrawer(){ $('drawer').classList.add('open'); }
  function closeDrawer(){ $('drawer').classList.remove('open'); }
  $('btnMenu').addEventListener('click', openDrawer);
  $('drawer').addEventListener('click', e=>{ if(e.target.classList.contains('shade')) closeDrawer(); });
  $('modeMic').addEventListener('change', ()=>{ if($('modeMic').checked){ $('secMic').style.display='block'; $('secFile').style.display='none'; $('tabSpec').checked=true; syncTabs(); } });
  $('modeFile').addEventListener('change', ()=>{ if($('modeFile').checked){ $('secMic').style.display='none'; $('secFile').style.display='block'; $('tabSpec').checked=true; syncTabs(); } });

  // 上段ボタン
  $('btnInit').addEventListener('click', async ()=>{
    await ensureAudio();
    if($('modeMic').checked){ await startMic(); closeDrawer(); }
  });
  $('btnStop').addEventListener('click', ()=>{
    stopMic();
    try{ stopCollector(); }catch(e){}
    try{ videoEl.pause(); }catch(e){}
    try{ audioEl.pause(); }catch(e){}
  });

  // マイク（ドロワー内）
  $('btnMicStart').addEventListener('click', async ()=>{ await startMic(); closeDrawer(); });
  $('micGain').addEventListener('input', ()=>{ if(micGainNode) micGainNode.gain.value=parseFloat($('micGain').value)||1; });
  $('btnMicSnap').addEventListener('click', ()=>{
    if(!micRing||micTotal===0){ alert('マイクを開始してください'); return; }
    const mono=concatFloat32(micRing,micTotal); lastWave=mono; lastWaveSR=audioCtx.sampleRate; clearGram();
    const {freqs,magDb,peak}=computeSpectrum(mono,audioCtx.sampleRate,parseInt($('fftSize').value,10),$('windowFn').value,$('avgMode').value, gramPainter());
    lastFreqs=freqs; lastSpec=magDb; lastPeak=peak; $('tabSpec').checked=true; syncTabs(); redraw(); updateInfo(audioCtx.sampleRate, mono.length/audioCtx.sampleRate, peak);
    closeDrawer();
  });

  // モーダル
  const modal=$('modal'), modalBody=$('modalBody'), modalTitle=$('modalTitle');
  function openModal(title,node){ modalTitle.textContent=title; modalBody.innerHTML=''; modalBody.appendChild(node); modal.style.display='flex'; }
  function closeModal(){ modal.style.display='none'; modalBody.innerHTML=''; }
  $('modalClose').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e=>{ if(e.target===modal) closeModal(); });

  // 初期
  function init(){
    resizeCanvas(); clearGram();
    document.querySelector('.title').textContent='リアルタイムFFT';
  }
  init();
})();
</script>
</body>
</html>
