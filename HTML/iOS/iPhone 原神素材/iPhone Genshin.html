<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原神素材_R0.14</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .side-nav {
            position: fixed;
            top: 0;
            right: -250px;
            width: 250px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 200;
            padding-top: 60px;
        }

        .side-nav.open { right: 0; }
        .side-nav a {
            display: block;
            padding: 15px;
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
        }

        main { padding: 15px; }

        .filter-section {
            margin-bottom: 15px;
            display: none;
        }
        select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card h3 { margin: 0 0 8px 0; font-size: 1rem; }
        .material-tag {
            display: inline-block;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin: 2px;
        }

        /* 属性カラー(英語名に連動) */
        .pyro, .fire { border-top: 4px solid #ff4e50; }
        .hydro, .water { border-top: 4px solid #2196f3; }
        .anemo, .wind { border-top: 4px solid #00ffcc; }
        .electro, .electric { border-top: 4px solid #af7ac5; }
        .dendro, .grass { border-top: 4px solid #2ecc71; }
        .cryo, .ice { border-top: 4px solid #85c1e9; }
        .geo, .rock { border-top: 4px solid #f1c40f; }

        .loading { text-align: center; padding: 20px; color: #888; }
        .error-msg { color: #ff4e50; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <h1 id="view-title">本日の曜日素材</h1>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>

    <nav id="sideNav" class="side-nav">
        <button class="close-btn" onclick="toggleMenu()">×</button>
        <a href="#" onclick="switchView('today')">本日の曜日素材</a>
        <a href="#" onclick="switchView('characters')">キャラ選択・育成素材</a>
    </nav>

    <main>
        <div id="filterSection" class="filter-section">
            <select id="elementFilter" onchange="renderCharacters()">
                <option value="all">すべての属性</option>
                <option value="炎">炎属性</option>
                <option value="水">水属性</option>
                <option value="風">風属性</option>
                <option value="雷">雷属性</option>
                <option value="草">草属性</option>
                <option value="氷">氷属性</option>
                <option value="岩">岩属性</option>
            </select>
        </div>

        <div id="statusMessage" class="loading">最新データをサーバーから読み込み中...</div>
        <div id="contentGrid" class="grid"></div>
    </main>

    <script>
        let genshinData = [];
        let currentView = 'today';
        const dayNames = ["日曜日 (全開放)", "月曜日/木曜日", "火曜日/金曜日", "水曜日/土曜日", "月曜日/木曜日", "火曜日/金曜日", "水曜日/土曜日"];

        // 天賦素材の名前から曜日を自動判定する
        function getDayOfWeek(materialName) {
            if (!materialName) return [0,1,2,3,4,5,6];
            if (/自由|繁栄|奮起|公平|あやかり/.test(materialName)) return [1, 4]; 
            if (/抗争|勤労|風雅|熱誠|焚化/.test(materialName)) return [2, 5]; 
            if (/詩文|黄金|浮世|篤行|正義|秩序/.test(materialName)) return [3, 6]; 
            return [0,1,2,3,4,5,6]; 
        }

        // 最も安定している有志の「最新日本語全キャラデータ」を直接取得
        async function fetchGenshinData() {
            try {
                // jsDelivrのCDNを経由させることで、iPhone SafariのCORS制限を突破し、高速に取得できます
                const response = await fetch('https://cdn.jsdelivr.net/gh/theBowja/genshin-db@main/src/data/japanese/characters.json');
                if (!response.ok) throw new Error('APIの読み込みに失敗しました');
                
                const rawData = await response.json();
                
                // データをアプリ用に整形
                genshinData = Object.keys(rawData).map(key => {
                    const char = rawData[key];
                    return {
                        name: char.name,
                        element: char.elementText || char.element, // 「炎」「水」などの日本語、または英語名
                        talentMat: char.talentMaterialType || "不明の素材",
                        bossMat: char.bossMaterialType || "週ボス不明",
                        dayOfWeek: getDayOfWeek(char.talentMaterialType)
                    };
                }).filter(char => char.name !== "旅人"); // 重複しやすい旅人を除外

                document.getElementById('statusMessage').style.display = 'none';
                initApp();
            } catch (error) {
                console.error(error);
                document.getElementById('statusMessage').className = 'error-msg';
                document.getElementById('statusMessage').textContent = 'APIからのデータ取得に失敗しました。時間をおいて再度お試しください。';
            }
        }

        function toggleMenu() {
            document.getElementById('sideNav').classList.toggle('open');
        }

        function switchView(view) {
            currentView = view;
            if(document.getElementById('sideNav').classList.contains('open')) {
                toggleMenu();
            }
            
            const title = document.getElementById('view-title');
            const filterSection = document.getElementById('filterSection');

            if (view === 'today') {
                const todayNum = new Date().getDay();
                title.textContent = `本日 (${dayNames[todayNum]}) の素材`;
                filterSection.style.display = 'none';
                renderTodayMaterials(todayNum);
            } else {
                title.textContent = "キャラクター別 育成素材";
                filterSection.style.display = 'block';
                renderCharacters();
            }
        }

        function renderTodayMaterials(day) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            const filtered = genshinData.filter(char => day === 0 || char.dayOfWeek.includes(day));

            filtered.forEach(char => {
                const card = document.createElement('div');
                // 属性名（日本語・英語両方に対応したクラス名付与）
                card.className = `card ${char.element === '炎' ? 'pyro' : char.element === '水' ? 'hydro' : char.element === '風' ? 'anemo' : char.element === '雷' ? 'electro' : char.element === '草' ? 'dendro' : char.element === '氷' ? 'cryo' : char.element === '岩' ? 'geo' : 'default'}`;
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="material-tag">${char.talentMat}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCharacters() {
            const grid = document.getElementById('contentGrid');
            const elementFilter = document.getElementById('elementFilter').value;
            grid.innerHTML = '';

            const filtered = genshinData.filter(char => {
                return elementFilter === 'all' || char.element === elementFilter;
            });

            filtered.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.element === '炎' ? 'pyro' : char.element === '水' ? 'hydro' : char.element === '風' ? 'anemo' : char.element === '雷' ? 'electro' : char.element === '草' ? 'dendro' : char.element === '氷' ? 'cryo' : char.element === '岩' ? 'geo' : 'default'}`;
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="material-tag" style="background:#555;">${char.element}</div>
                    <div class="material-tag">${char.talentMat}</div>
                    <div class="material-tag" style="background:#222;">${char.bossMat}</div>
                `;
                grid.appendChild(card);
            });
        }

        function initApp() {
            switchView('today');
        }

        fetchGenshinData();
    </script>
</body>
</html>
