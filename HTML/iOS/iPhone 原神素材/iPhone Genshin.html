<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>原神素材_R0.18</title>
<style>
  :root {
    /* 標準ダークテーマ設定 */
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-main: #ffffff;
    --text-sub: #b3b3b3;
    --accent: #ffb13f; /* 原神風のゴールド */
    --border: #333333;
    
    /* 属性カラー */
    --pyro: #ff9999;
    --hydro: #80c0ff;
    --anemo: #80ffd6;
    --electro: #d980ff;
    --dendro: #a6ff80;
    --cryo: #99ffff;
    --geo: #ffe680;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg-color); color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", sans-serif;
    -webkit-text-size-adjust: 100%; touch-action: manipulation;
  }

  /* ヘッダー */
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: env(safe-area-inset-top, 15px) 15px 15px 15px;
    background-color: var(--card-bg); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  h1 { font-size: 1.2rem; }
  .menu-btn { font-size: 1.5rem; background: none; border: none; color: var(--text-main); cursor: pointer; }

  /* サイドバー (ハンバーガーメニュー) */
  #sidebar {
    position: fixed; top: 0; left: -100%;
    width: 250px; height: 100%;
    background-color: var(--card-bg); border-right: 1px solid var(--border);
    transition: left 0.3s ease; z-index: 200;
    padding: env(safe-area-inset-top, 20px) 20px 20px 20px;
  }
  #sidebar.open { left: 0; }
  .close-btn { font-size: 1.8rem; background:none; border:none; color:var(--text-main); float:right; cursor:pointer;}
  .menu-item {
    display: block; width: 100%; padding: 15px 0; border-bottom: 1px solid var(--border);
    color: var(--text-main); font-size: 1.1rem; text-align: left; background: none; border-top: none; border-left: none; border-right: none; margin-top: 40px; cursor: pointer;
  }

  /* オーバーレイ暗幕 */
  #overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 150;
  }
  #overlay.show { display: block; }

  /* メインコンテンツ */
  main { padding: 15px; padding-bottom: env(safe-area-inset-bottom, 15px); }
  .section { display: none; animation: fadeIn 0.3s; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  h2 { font-size: 1.1rem; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 8px; }

  /* ドロップダウン絞り込み */
  select {
    width: 100%; padding: 12px; margin-bottom: 15px; background: var(--card-bg);
    color: var(--text-main); border: 1px solid var(--border); border-radius: 8px;
    font-size: 1rem; appearance: none; outline: none;
  }

  /* カードUI */
  .card {
    background-color: var(--card-bg); padding: 15px; border-radius: 10px;
    margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .card-title { font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
  .card-detail { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 5px; line-height: 1.4; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; background: #333; color: #121212; font-weight: bold; }
  
  /* 属性別左ボーダー色 */
  .elem-炎 { border-left: 4px solid var(--pyro); }
  .elem-水 { border-left: 4px solid var(--hydro); }
  .elem-風 { border-left: 4px solid var(--anemo); }
  .elem-雷 { border-left: 4px solid var(--electro); }
  .elem-草 { border-left: 4px solid var(--dendro); }
  .elem-氷 { border-left: 4px solid var(--cryo); }
  .elem-岩 { border-left: 4px solid var(--geo); }

  /* 読込中表示 */
  #loading { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1 id="page-title">本日の曜日素材</h1>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</header>

<div id="sidebar">
  <button class="close-btn" onclick="toggleMenu()">×</button>
  <button class="menu-item" onclick="switchTab('today')">📅 本日の天賦素材</button>
  <button class="menu-item" style="margin-top:0;" onclick="switchTab('characters')">👤 キャラ選択・育成素材</button>
</div>
<div id="overlay" onclick="toggleMenu()"></div>

<main>
  <div id="loading">サーバーから最新データを読込中...</div>

  <div id="tab-today" class="section">
    <h2>今日（<span id="today-day"></span>曜日）獲得できる天賦素材</h2>
    <div id="today-content"></div>
  </div>

  <div id="tab-characters" class="section">
    <h2>キャラ別 育成素材全般</h2>
    <select id="element-filter" onchange="filterCharacters()">
      <option value="all">すべての属性</option>
      <option value="炎">炎属性</option>
      <option value="水">水属性</option>
      <option value="風">風属性</option>
      <option value="雷">雷属性</option>
      <option value="草">草属性</option>
      <option value="氷">氷属性</option>
      <option value="岩">岩属性</option>
    </select>
    <div id="characters-content"></div>
  </div>
</main>

<script>
let genshinData = [];

// 曜日の取得
const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
const currentDay = dayNames[new Date().getDay()];

// 初期データの読み込み処理 (自動化の要)
async function loadData() {
  try {
    // 同じ階層に配置した data.json を読み込む。
    // (?v=... をつけることで、iPhone Safari特有のキャッシュ残りを防ぎ、常に最新を読み込みます)
    const response = await fetch('data.json?v=' + new Date().getTime());
    if (!response.ok) throw new Error("JSONデータの取得に失敗しました");
    
    const json = await response.json();
    genshinData = json.characters;

    // 読み込みが完了したらローディングを消す
    document.getElementById('loading').style.display = 'none';
    
    // 画面の構築
    document.getElementById('today-day').innerText = currentDay;
    renderToday();
    renderCharacters();
    switchTab('today'); // 初期タブを開く

  } catch (error) {
    document.getElementById('loading').innerText = "データの読み込みに失敗しました。data.jsonの配置を確認してください。";
    console.error("Data Load Error:", error);
  }
}

// 今日の素材一覧を描画
function renderToday() {
  const container = document.getElementById('today-content');
  container.innerHTML = '';
  
  // 日曜日はすべての素材が落ちるので "日" に該当するキャラ、または今日が対象のキャラを抽出
  const todayChars = genshinData.filter(c => c.days.includes(currentDay) || currentDay === "日");
  
  // 素材の名前(「正義」など)ごとにキャラをグループ分け
  const talents = {};
  todayChars.forEach(c => {
    if(!talents[c.talent]) talents[c.talent] = [];
    talents[c.talent].push(c);
  });

  if (Object.keys(talents).length === 0) {
    container.innerHTML = '<p>今日の対象素材はありません。</p>';
    return;
  }

  for (const [talent, chars] of Object.entries(talents)) {
    const card = document.createElement('div');
    card.className = 'card';
    
    // キャラ名のタグ（属性色）を生成
    let charTags = chars.map(c => `<span class="tag" style="background:var(--${getElemColor(c.element)})">${c.name}</span>`).join('');

    card.innerHTML = `
      <div class="card-title">「${talent}」の教え/導き/哲学</div>
      <div class="card-detail">使用キャラクター:</div>
      <div class="tags">${charTags}</div>
    `;
    container.appendChild(card);
  }
}

// キャラ選択一覧を描画
function renderCharacters(filterElem = 'all') {
  const container = document.getElementById('characters-content');
  container.innerHTML = '';

  // 属性絞り込み
  const filtered = genshinData.filter(c => filterElem === 'all' || c.element === filterElem);
  
  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = `card elem-${c.element}`;
    card.innerHTML = `
      <div class="card-title">${c.name} <span style="font-size:0.8rem; color:var(--text-sub)">(${c.element})</span></div>
      <div class="card-detail">📚 <b>天賦素材:</b> 「${c.talent}」 (${c.days.join(' / ')}曜日)</div>
      <div class="card-detail">⚔️ <b>ボス素材:</b> ${c.boss}</div>
      <div class="card-detail">🌸 <b>特産品:</b> ${c.specialty}</div>
    `;
    container.appendChild(card);
  });
}

// セレクトボックス変更時の絞り込み処理
function filterCharacters() {
  const elem = document.getElementById('element-filter').value;
  renderCharacters(elem);
}

// メニューの開閉
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

// タブの切り替え
function switchTab(tabId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  
  const titleMap = { 'today': '本日の曜日素材', 'characters': 'キャラ別 育成素材' };
  document.getElementById('page-title').innerText = titleMap[tabId];
  
  // サイドバーが開いていれば閉じる
  if (document.getElementById('sidebar').classList.contains('open')) {
    toggleMenu();
  }
}

// 属性名をCSS変数名に変換
function getElemColor(elem) {
  const map = {'炎':'pyro', '水':'hydro', '風':'anemo', '雷':'electro', '草':'dendro', '氷':'cryo', '岩':'geo'};
  return map[elem] || 'text-sub';
}

// ページ読み込み完了時にデータを取得開始
window.onload = loadData;
</script>
</body>
</html>
