<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原神素材_R0.13</title>
    <style>
        /* CSS変数によるダークテーマ定義 */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ヘッダー・ナビゲーション */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        /* ハンバーガーメニュー */
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .side-nav {
            position: fixed;
            top: 0;
            right: -250px;
            width: 250px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 200;
            padding-top: 60px;
        }

        .side-nav.open { right: 0; }
        .side-nav a {
            display: block;
            padding: 15px;
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
        }

        /* メインコンテンツエリア */
        main { padding: 15px; }

        /* フィルターUI */
        .filter-section {
            margin-bottom: 15px;
            display: none; /* キャラ一覧モードの時だけ表示 */
        }
        select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        /* カードデザイン */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card h3 { margin: 0 0 8px 0; font-size: 1rem; }
        .material-tag {
            display: inline-block;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin: 2px;
        }

        /* 属性別カラー（簡易版） */
        .pyro { border-left: 4px solid #ff4e50; }
        .hydro { border-left: 4px solid #2196f3; }
        .anemo { border-left: 4px solid #00ffcc; }
        .electro { border-left: 4px solid #af7ac5; }
        .dendro { border-left: 4px solid #2ecc71; }
        .cryo { border-left: 4px solid #85c1e9; }
        .geo { border-left: 4px solid #f1c40f; }

        .loading { text-align: center; padding: 5px; color: #888; }
    </style>
</head>
<body>

    <header>
        <h1 id="view-title">本日の曜日素材</h1>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>

    <nav id="sideNav" class="side-nav">
        <button class="close-btn" onclick="toggleMenu()">×</button>
        <a href="#" onclick="switchView('today')">本日の曜日素材</a>
        <a href="#" onclick="switchView('characters')">キャラ選択・育成素材</a>
    </nav>

    <main>
        <div id="filterSection" class="filter-section">
            <select id="elementFilter" onchange="renderCharacters()">
                <option value="all">すべての属性</option>
                <option value="Pyro">炎属性</option>
                <option value="Hydro">水属性</option>
                <option value="Anemo">風属性</option>
                <option value="Electro">雷属性</option>
                <option value="Dendro">草属性</option>
                <option value="Cryo">氷属性</option>
                <option value="Geo">岩属性</option>
            </select>
        </div>

        <div id="loading" class="loading">データを自動読み込み中...</div>
        <div id="contentGrid" class="grid"></div>
    </main>

    <script>
        // APIから取得したデータを保持する変数
        let genshinData = [];
        let currentView = 'today'; // 'today' or 'characters'

        // 曜日マッピング (JavaScriptの 0:日〜6:土)
        const dayNames = ["日曜日 (全開放)", "月曜日/木曜日", "火曜日/金曜日", "水曜日/土曜日", "月曜日/木曜日", "火曜日/金曜日", "水曜日/土曜日"];

        // 1. 外部サーバーから最新のキャラクターデータを自動読み込み (API)
        // ※有志が更新しているオープンソースのRAWデータ（JSON）をフェッチします
        async function fetchGenshinData() {
            try {
                // 例として、高頻度で更新されるMinatoGenshin等のデータをデモ用にシンプル化したエンドポイント
                // 本番環境では安定した独自のJSON、または信頼できるGenshin API（Genshin.dev等）に差し替え可能です。
                const response = await fetch('https://raw.githubusercontent.com/theBowja/genshin-db/master/src/data/japanese/characters.json');
                
                // 上記が万が一繋がらない場合の統合データ(ダミー兼フォールバック)
                if(!response.ok) throw new Error();
                
                const rawData = await response.json();
                
                // データを扱いやすい形に整形（APIの構造によって調整してください）
                genshinData = Object.keys(rawData).map(key => {
                    const char = rawData[key];
                    return {
                        name: char.name,
                        element: char.element,
                        // 天賦素材の曜日（仮にAPIから取得、無ければ文字検索など）
                        // ※自動取得の肝：APIデータ内の「dayOfWeek」や「material」を参照する構造にします
                        dayOfWeek: guessDayOfWeek(char.talentMaterialType), 
                        talentMat: char.talentMaterialType || "不明の素材",
                        bossMat: char.bossMaterialType || "週ボス素材"
                    };
                });

                document.getElementById('loading').style.display = 'none';
                initApp();
            } catch (error) {
                console.error("データ取得失敗。ローカルのバックアップを読み込みます", error);
                // サーバーダウン時のフォールバック（最低限の動作保証）
                genshinData = [
                    { name: "神里綾華", element: "Cryo", dayOfWeek: [2, 5], talentMat: "「風雅」", bossMat: "血玉の枝" },
                    { name: "鍾離", element: "Geo", dayOfWeek: [3, 6], talentMat: "「黄金」", bossMat: "武煉の魂・孤影" },
                    { name: "ナヒーダ", element: "Dendro", dayOfWeek: [2, 5], talentMat: "「創意」", bossMat: "傀儡の糸" }
                ];
                document.getElementById('loading').style.display = 'none';
                initApp();
            }
        }

        // 天賦素材名から曜日を推測する簡易ロジック（自動化を補佐）
        function guessDayOfWeek(materialName) {
            if (!materialName) return [0,1,2,3,4,5,6];
            if (/自由|繁栄|奮起|公平/.test(materialName)) return [1, 4]; // 月木
            if (/抗争|勤労|風雅|熱誠/.test(materialName)) return [2, 5]; // 火金
            if (/詩文|黄金|浮世|篤行/.test(materialName)) return [3, 6]; // 水土
            return [0,1,2,3,4,5,6];
        }

        // ハンバーガーメニューの開閉
        function toggleMenu() {
            document.getElementById('sideNav').classList.toggle('open');
        }

        // 画面の切り替え（本日 vs キャラ一覧）
        function switchView(view) {
            currentView = view;
            toggleMenu();
            
            const title = document.getElementById('view-title');
            const filterSection = document.getElementById('filterSection');

            if (view === 'today') {
                const todayNum = new Date().getDay();
                title.textContent = `本日 (${dayNames[todayNum]}) の素材`;
                filterSection.style.display = 'none';
                renderTodayMaterials(todayNum);
            } else {
                title.textContent = "キャラクター別 育成素材";
                filterSection.style.display = 'block';
                renderCharacters();
            }
        }

        // 【モード1】本日の曜日素材の表示
        function renderTodayMaterials(day) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            // 本日の曜日に合致するキャラを抽出
            const filtered = genshinData.filter(char => day === 0 || char.dayOfWeek.includes(day));

            if(filtered.length === 0) {
                grid.innerHTML = '<p>対象データがありません</p>';
                return;
            }

            filtered.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.element.toLowerCase()}`;
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="material-tag">${char.talentMat}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 【モード2】キャラクター一覧（属性絞り込み付き）の表示
        function renderCharacters() {
            const grid = document.getElementById('contentGrid');
            const elementFilter = document.getElementById('elementFilter').value;
            grid.innerHTML = '';

            const filtered = genshinData.filter(char => {
                return elementFilter === 'all' || char.element === elementFilter;
            });

            filtered.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.element.toLowerCase()}`;
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="material-tag" style="background:#555;">${char.element}</div>
                    <div class="material-tag">${char.talentMat}</div>
                    <div class="material-tag" style="background:#222;">${char.bossMat}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 初期化
        function initApp() {
            switchView('today');
        }

        // 起動時にデータをフェッチ
        fetchGenshinData();
    </script>
</body>
</html>
