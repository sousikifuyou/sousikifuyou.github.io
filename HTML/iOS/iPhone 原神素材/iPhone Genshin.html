<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原神素材_R0.15</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .side-nav {
            position: fixed;
            top: 0;
            right: -250px;
            width: 250px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 200;
            padding-top: 60px;
        }

        .side-nav.open { right: 0; }
        .side-nav a {
            display: block;
            padding: 15px;
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
        }

        main { padding: 15px; }

        .filter-section {
            margin-bottom: 15px;
            display: none;
        }
        select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card h3 { margin: 0 0 8px 0; font-size: 1rem; }
        .material-tag {
            display: inline-block;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin: 2px;
        }

        /* 属性カラー(英語名に連動) */
        .pyro { border-top: 4px solid #ff4e50; }
        .hydro { border-top: 4px solid #2196f3; }
        .anemo { border-top: 4px solid #00ffcc; }
        .electro { border-top: 4px solid #af7ac5; }
        .dendro { border-top: 4px solid #2ecc71; }
        .cryo { border-top: 4px solid #85c1e9; }
        .geo { border-top: 4px solid #f1c40f; }

        .loading { text-align: center; padding: 20px; color: #888; }
        .error-msg { color: #ff4e50; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <h1 id="view-title">本日の曜日素材</h1>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>

    <nav id="sideNav" class="side-nav">
        <button class="close-btn" onclick="toggleMenu()">×</button>
        <a href="#" onclick="switchView('today')">本日の曜日素材</a>
        <a href="#" onclick="switchView('characters')">キャラ選択・育成素材</a>
    </nav>

    <main>
        <div id="filterSection" class="filter-section">
            <select id="elementFilter" onchange="renderCharacters()">
                <option value="all">すべての属性</option>
                <option value="Pyro">炎属性</option>
                <option value="Hydro">水属性</option>
                <option value="Anemo">風属性</option>
                <option value="Electro">雷属性</option>
                <option value="Dendro">草属性</option>
                <option value="Cryo">氷属性</option>
                <option value="Geo">岩属性</option>
            </select>
        </div>

        <div id="statusMessage" class="loading">世界共通APIから最新データを読み込み中...</div>
        <div id="contentGrid" class="grid"></div>
    </main>

    <script>
        let genshinData = [];
        let currentView = 'today';
        const dayNames = ["日曜日 (全開放)", "月曜日/木曜日", "火曜日/金曜日", "水曜日/土曜日", "月曜日/木曜日", "火曜日/金曜日", "水曜日/土曜日"];

        // 国際APIの素材英語名から、日本の曜日をマッピングする辞書
        const materialDays = {
            "freedom": [1, 4], "prosperity": [1, 4], "admonition": [1, 4], "equity": [1, 4], "contention": [2, 5], 
            "diligence": [2, 5], "elegance": [2, 5], "ingenuity": [2, 5], "ballad": [3, 6], "gold": [3, 6], 
            "transience": [3, 6], "praxis": [3, 6], "justice": [3, 6], "order": [3, 6]
        };

        // 素材の英語名を日本語に変換する辞書
        const jpMaterials = {
            "freedom": "「自由」", "prosperity": "「繁栄」", "admonition": "「忠言」", "equity": "「公平」",
            "contention": "「抗争」", "diligence": "「勤労」", "elegance": "「風雅」", "ingenuity": "「創意」",
            "ballad": "「詩文」", "gold": "「黄金」", "transience": "「浮世」", "praxis": "「篤行」",
            "justice": "「正義」", "order": "「秩序」"
        };

        // APIデータから曜日と日本語名を割り出す
        function parseTalentMaterial(char) {
            const mat = (char.info && char.info.talentMaterial) ? char.info.talentMaterial.toLowerCase() : "";
            let matKey = "unknown";
            
            for (let key in materialDays) {
                if (mat.includes(key)) {
                    matKey = key;
                    break;
                }
            }
            return {
                days: materialDays[matKey] || [0,1,2,3,4,5,6],
                name: jpMaterials[matKey] || char.info.talentMaterial || "専用素材"
            };
        }

        // Genshin.dev APIからデータを取得
        async function fetchGenshinData() {
            try {
                // キャラクターの全データを一括取得する公式エンドポイント（軽量）
                const response = await fetch('https://api.genshin.dev/characters/all');
                if (!response.ok) throw new Error('API通信エラー');
                
                const rawData = await response.json();
                
                // 扱いやすいように変換
                genshinData = rawData.map(char => {
                    const matInfo = parseTalentMaterial(char);
                    return {
                        name: char.name,
                        element: char.vision, // Pyro, Hydro, etc.
                        talentMat: matInfo.name,
                        bossMat: char.info.weeklyBoss || "週ボス",
                        dayOfWeek: matInfo.days
                    };
                }).filter(char => char.name !== "Traveler"); // 旅人除外

                document.getElementById('statusMessage').style.display = 'none';
                initApp();
            } catch (error) {
                console.error(error);
                document.getElementById('statusMessage').className = 'error-msg';
                document.getElementById('statusMessage').textContent = 'APIサーバーが混雑しています。iPhoneの通信制限、または通信環境が良い場所でお試しください。';
            }
        }

        function toggleMenu() {
            document.getElementById('sideNav').classList.toggle('open');
        }

        function switchView(view) {
            currentView = view;
            if(document.getElementById('sideNav').classList.contains('open')) {
                toggleMenu();
            }
            
            const title = document.getElementById('view-title');
            const filterSection = document.getElementById('filterSection');

            if (view === 'today') {
                const todayNum = new Date().getDay();
                title.textContent = `本日 (${dayNames[todayNum]}) の素材`;
                filterSection.style.display = 'none';
                renderTodayMaterials(todayNum);
            } else {
                title.textContent = "キャラクター別 育成素材";
                filterSection.style.display = 'block';
                renderCharacters();
            }
        }

        function renderTodayMaterials(day) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            const filtered = genshinData.filter(char => day === 0 || char.dayOfWeek.includes(day));

            filtered.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.element.toLowerCase()}`;
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="material-tag">${char.talentMat}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCharacters() {
            const grid = document.getElementById('contentGrid');
            const elementFilter = document.getElementById('elementFilter').value;
            grid.innerHTML = '';

            const filtered = genshinData.filter(char => {
                return elementFilter === 'all' || char.element === elementFilter;
            });

            filtered.forEach(char => {
                const card = document.createElement('div');
                card.className = `card ${char.element.toLowerCase()}`;
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="material-tag" style="background:#555;">${char.element}</div>
                    <div class="material-tag">${char.talentMat}</div>
                    <div class="material-tag" style="background:#222;">${char.bossMat}</div>
                `;
                grid.appendChild(card);
            });
        }

        function initApp() {
            switchView('today');
        }

        fetchGenshinData();
    </script>
</body>
</html>
