<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>原神素材_R0.17</title>
    <style>
        /* --- ダークテーマ標準のCSS --- */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #aaaaaa;
            --accent: #4fc3f7;
            --border: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%; /* iPhoneでの文字拡大防止 */
        }

        /* ヘッダー＆ハンバーガーメニュー */
        .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: var(--text-main);
            margin-right: 15px;
            cursor: pointer;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
        }

        /* サイドバーメニュー */
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background-color: var(--panel-bg);
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 2000;
            padding-top: 60px;
        }
        .sidebar.active { left: 0; }
        
        .sidebar a {
            display: block;
            padding: 15px 20px;
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
        }

        /* 背景の暗転オーバーレイ */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
        }
        .overlay.active { display: block; }

        /* コンテンツエリア */
        .content { padding: 15px; }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 16px; /* 16px未満だとiPhoneでズームされるため */
        }

        /* カードデザイン */
        .card-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .card {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .card h3 {
            margin: 0 0 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
        }
        .card p { margin: 5px 0; font-size: 14px; color: var(--text-sub); }
        
        /* 属性バッジ */
        .badge {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
        }
        .炎 { background: #ff9999; }
        .水 { background: #99ccff; }
        .風 { background: #99ffcc; }
        .雷 { background: #cc99ff; }
        .草 { background: #aaff99; }
        .氷 { background: #ccffff; }
        .岩 { background: #ffcc99; }

    </style>
</head>
<body>

    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h1 id="page-title">本日の曜日素材</h1>
    </div>

    <div class="sidebar" id="sidebar">
        <a href="#" onclick="showToday(); return false;">📅 本日の曜日素材</a>
        <a href="#" onclick="showCharacters(); return false;">👥 キャラ選択・育成素材</a>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="content" id="main-content">
        <p>データを読み込み中...</p>
    </div>

    <script>
        let genshinData = null;

        // データ読み込み（キャッシュ対策付き）
        async function loadData() {
            try {
                // ?v=タイムスタンプを付けることでiPhone Safariの強制キャッシュを回避し、常に最新を読み込む
                const response = await fetch('./data.json?v=' + new Date().getTime());
                if (!response.ok) throw new Error('通信エラー');
                genshinData = await response.json();
                
                // 初回は曜日素材を表示
                showToday();
            } catch (error) {
                document.getElementById('main-content').innerHTML = `<p style="color:red;">データの自動読み込みに失敗しました。</p>`;
                console.error(error);
            }
        }

        // メニューの開閉
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // 1. 本日の曜日素材画面
        function showToday() {
            document.getElementById('page-title').innerText = '本日の曜日素材';
            const container = document.getElementById('main-content');
            
            const day = new Date().getDay(); // 0(日) 〜 6(土)
            const daysStr = ['日', '月', '火', '水', '木', '金', '土'];
            
            let html = `<h2 style="font-size:16px;">今日は ${daysStr[day]}曜日 です</h2>`;
            
            if (day === 0) {
                html += '<p>日曜日はすべての天賦・武器素材がドロップします！</p>';
            } else {
                const todayMats = genshinData.materials_schedule[day];
                html += `<p style="color:var(--accent);">対象の天賦素材: ${todayMats.join(', ')}</p>`;
                
                // 今日の素材を使うキャラを抽出
                const todayChars = genshinData.characters.filter(c => todayMats.includes(c.talent));
                
                html += '<div class="card-container">';
                todayChars.forEach(c => {
                    html += `
                        <div class="card">
                            <h3>${c.name} <span class="badge ${c.element}">${c.element}</span></h3>
                            <p>📝 天賦素材: ${c.talent}</p>
                        </div>
                    `;
                });
                html += '</div>';
            }
            container.innerHTML = html;
            
            // メニューが開いていたら閉じる
            if (document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        }

        // 2. キャラクター選択・育成素材一覧画面
        function showCharacters(filterElement = 'all') {
            document.getElementById('page-title').innerText = 'キャラ育成素材';
            const container = document.getElementById('main-content');
            
            let html = `
                <select id="element-filter" onchange="showCharacters(this.value)">
                    <option value="all" ${filterElement === 'all' ? 'selected' : ''}>すべての属性</option>
                    <option value="炎" ${filterElement === '炎' ? 'selected' : ''}>炎属性</option>
                    <option value="水" ${filterElement === '水' ? 'selected' : ''}>水属性</option>
                    <option value="風" ${filterElement === '風' ? 'selected' : ''}>風属性</option>
                    <option value="雷" ${filterElement === '雷' ? 'selected' : ''}>雷属性</option>
                    <option value="草" ${filterElement === '草' ? 'selected' : ''}>草属性</option>
                    <option value="氷" ${filterElement === '氷' ? 'selected' : ''}>氷属性</option>
                    <option value="岩" ${filterElement === '岩' ? 'selected' : ''}>岩属性</option>
                </select>
                <div class="card-container">
            `;

            // 属性でフィルタリング
            const filtered = genshinData.characters.filter(c => filterElement === 'all' || c.element === filterElement);
            
            filtered.forEach(c => {
                html += `
                    <div class="card">
                        <h3>${c.name} <span class="badge ${c.element}">${c.element}</span></h3>
                        <p>📝 天賦素材: ${c.talent}</p>
                        <p>👹 ボス素材: ${c.boss}</p>
                        <p>🌸 地域特産: ${c.specialty}</p>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;

            if (document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        }

        // ページ読み込み時に実行
        window.onload = loadData;
    </script>
</body>
</html>
